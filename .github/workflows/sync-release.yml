name: Sync release to docs

# Receiver half of the ballboy release -> docs Auto-PR. Fired by a
# repository_dispatch from the ballboy repo on every v* tag deploy (see
# SYNC-SETUP.md), or run manually via workflow_dispatch for testing.
#
# HYBRID MODE (see the "Decide sync mode" step):
#   * No command drift  -> commit the changelog straight to main via a GitHub
#     App token, so Pages rebuilds (a default-GITHUB_TOKEN push does NOT trigger
#     downstream workflows — anti-recursion — so we mint an App token instead).
#     Zero human touch.
#   * Command drift      -> open a PR (as before) AND DM the owner, because drift
#     means the FAQ / feature-doc pages may need a hand-edit — exactly when a
#     human should be in the loop.
#   * App secrets absent -> gracefully falls back to always-open-a-PR (today's
#     behavior), so this workflow is safe to ship before the secrets are added.
#
# Secrets used (all optional; each guarded): DOCS_SYNC_APP_ID +
# DOCS_SYNC_APP_PRIVATE_KEY (auto-commit to main) and PROD_DISCORD_TOKEN (owner DM).

on:
  repository_dispatch:
    types: [bot-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v1.0.25"
        required: true
        type: string
      note:
        description: >-
          Full release-note markdown (frontmatter + body) for a manual/testing
          run. Leave blank to only exercise the no-op / guard path.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write   # to workflow_dispatch pages.yml after an auto-commit

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Prepare release inputs (dispatch)
        if: github.event_name == 'repository_dispatch'
        env:
          VERSION: ${{ github.event.client_payload.version }}
          NOTE_B64: ${{ github.event.client_payload.note_b64 }}
          MANIFEST_B64: ${{ github.event.client_payload.manifest_b64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sync"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "$NOTE_B64" | base64 --decode > "$RUNNER_TEMP/sync/release-note.md"
          echo "NOTE_PATH=$RUNNER_TEMP/sync/release-note.md" >> "$GITHUB_ENV"
          echo "$MANIFEST_B64" | base64 --decode > "$RUNNER_TEMP/sync/manifest.txt"
          echo "MANIFEST_PATH=$RUNNER_TEMP/sync/manifest.txt" >> "$GITHUB_ENV"

      - name: Prepare release inputs (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
          NOTE: ${{ inputs.note }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sync"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          if [ -n "$NOTE" ]; then
            printf '%s\n' "$NOTE" > "$RUNNER_TEMP/sync/release-note.md"
            echo "NOTE_PATH=$RUNNER_TEMP/sync/release-note.md" >> "$GITHUB_ENV"
          else
            echo "NOTE_PATH=" >> "$GITHUB_ENV"
          fi
          # workflow_dispatch has no manifest input — manual runs only
          # exercise the changelog transform / no-op guard, not drift.
          echo "MANIFEST_PATH=" >> "$GITHUB_ENV"

      - name: Check for existing changelog page
        id: existing
        run: |
          set -euo pipefail
          if [ -f "content/docs/changelog/${VERSION}.md" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog page
        if: env.NOTE_PATH != ''
        run: python3 scripts/release_to_changelog.py "$NOTE_PATH"

      - name: Check command manifest drift
        id: drift
        if: env.MANIFEST_PATH != ''
        run: |
          set -euo pipefail
          python3 scripts/check_manifest_drift.py "$MANIFEST_PATH" | tee "$RUNNER_TEMP/sync/drift-report.md"
          if grep -q "^NO DRIFT" "$RUNNER_TEMP/sync/drift-report.md"; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update baseline command manifest
        if: env.MANIFEST_PATH != ''
        run: cp "$MANIFEST_PATH" data/command-manifest.txt

      - name: Check auto-commit app is configured
        id: appcfg
        env:
          APP_ID: ${{ secrets.DOCS_SYNC_APP_ID }}
          APP_KEY: ${{ secrets.DOCS_SYNC_APP_PRIVATE_KEY }}
        run: |
          if [ -n "${APP_ID:-}" ] && [ -n "${APP_KEY:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "DOCS_SYNC_APP_ID / DOCS_SYNC_APP_PRIVATE_KEY not set — auto-commit disabled; will open a PR instead."
          fi

      - name: Decide sync mode
        id: decide
        env:
          EXISTS: ${{ steps.existing.outputs.exists }}
          HAS_DRIFT: ${{ steps.drift.outputs.has_drift || 'false' }}
          APP_OK: ${{ steps.appcfg.outputs.configured }}
        run: |
          set -euo pipefail
          # Modes: noop (nothing to do) | commit (auto to main) | pr (needs a human).
          if [ "$HAS_DRIFT" = "true" ]; then
            MODE=pr        # drift => the owner may need to hand-edit FAQ/feature docs
          elif [ "$EXISTS" = "true" ]; then
            MODE=noop      # changelog already present and no drift
          elif [ "$APP_OK" = "true" ]; then
            MODE=commit    # new changelog, no drift, App token available => auto to main
          else
            MODE=pr        # would auto-commit, but no App token => fall back to PR
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Sync mode: $MODE (exists=$EXISTS drift=$HAS_DRIFT app=$APP_OK)"

      - name: Mint installation token (auto-commit)
        if: steps.decide.outputs.mode == 'commit'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DOCS_SYNC_APP_ID }}
          private-key: ${{ secrets.DOCS_SYNC_APP_PRIVATE_KEY }}

      - name: Commit changelog to main
        if: steps.decide.outputs.mode == 'commit'
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "ballboy-docs-sync[bot]"
          git config user.email "ballboy-docs-sync[bot]@users.noreply.github.com"
          git add content/docs/changelog/*.md data/command-manifest.txt || true
          if git diff --cached --quiet; then
            echo "nothing to commit for $VERSION"; exit 0
          fi
          git commit -m "docs: sync ${VERSION} release"
          # Push with the App-token remote so the commit is authored by the sync bot
          # rather than github-actions[bot]. (A push alone does NOT rebuild the site —
          # neither a GITHUB_TOKEN push nor an App-token push reliably triggers pages.yml
          # here — so the next step dispatches the Pages build explicitly.)
          git push "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:main"
          echo "Committed ${VERSION} changelog directly to main."

      - name: Trigger Pages rebuild
        if: steps.decide.outputs.mode == 'commit'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # workflow_dispatch is the one event that DOES fire from the default
          # GITHUB_TOKEN (GitHub's anti-recursion carve-out), so this reliably
          # rebuilds the site against the commit we just pushed to main.
          gh workflow run pages.yml --repo "${GITHUB_REPOSITORY}" --ref main
          echo "Dispatched pages.yml to rebuild the docs site."

      - name: Build PR body
        if: steps.decide.outputs.mode == 'pr'
        run: |
          set -euo pipefail
          {
            echo "Automated docs sync for release **${VERSION}**."
            echo
            echo "## Changelog"
            echo
            page="content/docs/changelog/${VERSION}.md"
            if [ -f "$page" ]; then
              summary=$(grep '^summary:' "$page" | sed -E 's/^summary: //')
              echo "- Added \`$page\` — $summary"
            else
              echo "- No release note was provided for this run; changelog page not generated."
            fi
            echo
            echo "## Command manifest drift"
            echo
            if [ -f "$RUNNER_TEMP/sync/drift-report.md" ]; then
              cat "$RUNNER_TEMP/sync/drift-report.md"
            else
              echo "No candidate manifest was provided for this run."
            fi
          } > "$RUNNER_TEMP/sync/pr-body.md"

      - name: Open pull request
        id: cpr
        if: steps.decide.outputs.mode == 'pr'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: sync ${{ env.VERSION }} release"
          branch: sync/release-${{ env.VERSION }}
          delete-branch: true
          title: "docs: sync ${{ env.VERSION }} release"
          body-path: ${{ runner.temp }}/sync/pr-body.md
          add-paths: |
            content/docs/changelog/*.md
            data/command-manifest.txt

      - name: DM the owner about the PR
        if: steps.decide.outputs.mode == 'pr' && steps.cpr.outputs.pull-request-url != ''
        env:
          DISCORD_TOKEN: ${{ secrets.PROD_DISCORD_TOKEN }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          set -uo pipefail
          if [ -z "${DISCORD_TOKEN:-}" ]; then
            echo "PROD_DISCORD_TOKEN not set — skipping owner DM."; exit 0
          fi
          OWNER_ID="441675650261319701"   # craigeous
          MSG="📝 Ball Boy docs sync for **${VERSION}** opened a PR — command drift was detected, so the FAQ / feature-doc pages may need a hand-edit. Review & merge: ${PR_URL}"
          DM=$(curl -sS -X POST \
            -H "Authorization: Bot ${DISCORD_TOKEN}" \
            -H "Content-Type: application/json" \
            https://discord.com/api/v10/users/@me/channels \
            -d '{"recipient_id":"'"${OWNER_ID}"'"}' | jq -r '.id // empty')
          if [ -z "$DM" ]; then
            echo "could not open DM channel (non-fatal)"; exit 0
          fi
          curl -sS -o /dev/null -w "owner DM post: HTTP %{http_code}\n" -X POST \
            -H "Authorization: Bot ${DISCORD_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/${DM}/messages" \
            -d "$(jq -n --arg c "$MSG" '{content:$c}')"
          # Never fail the sync over a notification hiccup.
          exit 0
