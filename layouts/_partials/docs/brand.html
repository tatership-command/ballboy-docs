<h2 class="book-brand">
  <a class="flex align-center" href="{{ partial "docs/links/home" . }}">
    {{ with resources.Get "img/ball-boy-header.png" }}
      {{ $img := . | fingerprint }}
      <img src="{{ $img.RelPermalink }}" alt="{{ $.Site.Title }}" class="book-brand-img" />
    {{ end }}
    <span class="book-brand-title">{{ .Site.Title }}</span>
  </a>
</h2>
